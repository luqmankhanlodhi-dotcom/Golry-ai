<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Glory AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  font-family: Arial;
  background: #111;
  color: white;
  overflow: hidden;
}

/* LOADING SCREEN */
#loading {
  position: absolute;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#title {
  color: #00ffcc;
  margin-bottom: 15px;
  text-align: center;
  font-size: 16px;
}

#barBox {
  width: 80%;
  height: 10px;
  border: 1px solid #00ffcc;
}

#bar {
  height: 100%;
  width: 0%;
  background: #00ffcc;
}

#percent {
  margin-top: 10px;
  color: #aaa;
}

/* APP */
#app {
  height: 100%;
  width: 100%;
  display: none;
  flex-direction: column;
}

/* HEADER */
header {
  background: #222;
  padding: 10px;
  text-align: center;
  flex-shrink: 0;
}

#sub {
  font-size: 12px;
  color: #aaa;
  margin-top: 3px;
}

/* CHAT AREA */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 8px 0;
  word-break: break-word;
}

.user { color: #00ffcc; }
.bot { color: #ffcc00; }

/* INPUT BAR */
#inputBar {
  display: flex;
  padding: 10px;
  background: #222;
  gap: 8px;
  flex-shrink: 0;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
  font-size: 14px;
}

button {
  width: 80px;
  border: none;
  background: #00ffcc;
  font-weight: bold;
}

</style>

</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div id="title">World Fastest chatbot is opening...</div>

  <div id="barBox">
    <div id="bar"></div>
  </div>

  <div id="percent">0%</div>
</div>

<!-- APP -->
<div id="app">

<header>
  Glory AI
  <div id="sub">Hy it's Glory Ai how can i help you</div>
</header>

<div id="chat"></div>

<div id="inputBar">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

</div>

<script>

/* LOADING (10 seconds) */
let p = 0;
let bar = document.getElementById("bar");
let percent = document.getElementById("percent");

let load = setInterval(() => {
  p++;
  bar.style.width = p + "%";
  percent.innerText = p + "%";

  if (p >= 100) {
    clearInterval(load);
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "flex";
  }
}, 100);

/* CHAT LOGIC */
function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">You: ${text}</div>`;

  let q = text.toLowerCase();
  let reply = "";

  if (
    q.includes("who developed") ||
    q.includes("who made") ||
    q.includes("founder") ||
    q.includes("developer")
  ) {
    reply = "Luqman khan Lodhi";
  } else {
    reply = "I don't know gng🥀🥀";
  }

  setTimeout(() => {
    chat.innerHTML += `<div class="msg bot">Bot: ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 300);

  input.value = "";
}

</script>

</body>
</html>
